<!DOCTYPE html>
<html>
<head>
    <title>Choose your mood</title>
    <link rel="stylesheet" href="style.css">
</head>

<body id="body">

    <h1>Choose your mood</h1>

    <div class="buttons">

        <button class="happy" onclick="happyMood()">Happy</button>
        <button class="sad" onclick="sadMood()">Sad</button>
        <button class="angry" onclick="angryMood()">Angry</button>
        <button class="relaxed" onclick="relaxedMood()">Relaxed</button>

    </div>

    <p id="message"></p>

    <script src="script.js"></script>

</body>
</html>
